<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CareSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        if (localStorage.getItem('accessToken')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center px-6">

<div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900">স্বাগতম!</h1>
            <p class="text-gray-500 mt-2">আপনার অ্যাকাউন্টে লগইন করুন</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" required
                       class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                       placeholder="example@mail.com">
            </div>
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <div class="relative mt-1">
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                           placeholder="••••••••">

                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-blue-600 focus:outline-none">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600">
                    <span class="ml-2 text-gray-600">মনে রাখুন</span>
                </label>
                <a href="#" class="text-blue-600 hover:underline">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>

            <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg transform active:scale-95">
                Login
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-600">
            অ্যাকাউন্ট নেই? <a href="signup.html" class="text-blue-600 font-bold hover:underline">নতুন অ্যাকাউন্ট খুলুন</a>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
