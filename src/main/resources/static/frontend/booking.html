<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | CareSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
<div id="navbar-container"></div>

<main class="max-w-5xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="lg:col-span-1">
            <div id="doctor-summary" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                <div class="text-center">
                    <img id="doc-img" src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" class="w-32 h-32 rounded-2xl mx-auto object-cover mb-4 shadow-md">
                    <h2 id="doc-name" class="text-2xl font-bold text-gray-800">Loading...</h2>
                    <p id="doc-spec" class="text-blue-600 font-medium">Specialist</p>
                </div>
                <div class="mt-6 space-y-3 text-sm text-gray-600">
                    <p><i class="fas fa-money-bill-wave mr-2 text-green-500"></i> Consultation Fee: <span class="font-bold text-gray-900">৳ <span id="doc-fee">0</span></span></p>
                    <p><i class="fas fa-clock mr-2 text-blue-500"></i> Instant Confirmation</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Select Date & Time</h3>

                <form id="bookingForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Appointment Date</label>
                        <input type="date" id="appointmentDate" required
                               class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Available Slots</label>
                        <div id="slots-container" class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                            <p class="col-span-full text-gray-400 text-sm italic">Please select a date first...</p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Reason for Visit (Optional)</label>
                        <textarea id="reason" rows="3" placeholder="Briefly describe your problem..."
                                  class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>

                    <button type="submit" id="payBtn" disabled
                            class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg disabled:bg-gray-300 disabled:cursor-not-allowed">
                        Proceed to Payment
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="js/main.js"></script>
<script src="js/booking.js"></script>
</body>
</html>
