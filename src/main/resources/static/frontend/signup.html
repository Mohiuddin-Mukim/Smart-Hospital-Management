<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CareSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4">

<div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
    <div class="p-8 md:p-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-blue-900">Create Account</h1>
            <p class="text-gray-500 mt-2">আপনার স্বাস্থ্যসেবা যাত্রা শুরু হোক এখান থেকেই</p>
        </div>

        <form id="signupForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Full Name(পুরো নাম)</label>
                <input type="text" id="name" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="John Doe">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Email Address(ইমেইল এ্যাড্রেস)</label>
                <input type="email" id="email" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="example@mail.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Phone Number(ফোন নাম্বার)</label>
                <input type="text" id="phone" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="017XXXXXXXX">
            </div>

            <div class="relative">
                <label class="block text-sm font-semibold text-gray-700">Password(পাসওয়ার্ড)</label>
                <input type="password" id="password" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Age(বয়স)</label>
                <input type="number" id="age" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="25">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Gender(লিঙ্গ)</label>
                <select id="gender" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <option value="">Select Gender</option>
                    <option value="Male">Male(পুরুষ)</option>
                    <option value="Female">Female(মহিলা)</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Address(ঠিকানা)</label>
                <textarea id="address" rows="2" class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Your full address"></textarea>
            </div>

            <div class="md:col-span-2">
                <button type="submit" id="signupBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg transform active:scale-95">
                    Register Now
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-gray-600">
            ইতিমধ্যেই অ্যাকাউন্ট আছে? <a href="login.html" class="text-blue-600 font-bold hover:underline">লগইন করুন</a>
        </p>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
